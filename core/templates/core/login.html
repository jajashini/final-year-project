{% extends 'base.html' %}

{% block content %}
<div style="max-width: 450px; margin: 50px auto;">
    <div class="card">
        <h1 style="text-align: center;">Mission <span style="color: var(--primary);">Access</span></h1>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 30px;">Authenticate to access the Marine
            Lab.</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
            </div>

            <button type="submit" class="btn btn-solid" style="width: 100%; margin-top: 10px;">Login</button>
        </form>

       
    </div>
</div>
{% endblock %}
